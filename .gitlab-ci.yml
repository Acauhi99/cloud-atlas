image: python:3.14-slim

variables:
  UV_CACHE_DIR: $CI_PROJECT_DIR/.uv-cache
  PIP_BREAK_SYSTEM_PACKAGES: "1"

cache:
  paths:
    - .uv-cache/

before_script:
  - pip install uv

stages:
  - lint
  - typecheck
  - test
  - audit
  - deps
  - docker

lint:
  stage: lint
  script:
    - uv sync --frozen
    - uv run ruff format --check .
    - uv run ruff check .

typecheck:
  stage: typecheck
  script:
    - uv sync --frozen
    - uv run mypy app

test:
  stage: test
  image: python:3.14-slim
  services:
    - name: postgres:16-alpine
      alias: db
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: cloud_atlas_test
    APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cloud_atlas_test
  script:
    - pip install uv
    - uv sync --frozen
    - uv run pytest

audit:
  stage: audit
  script:
    - uv sync --frozen
    - uvx pip-audit

deps:
  stage: deps
  script:
    - uv lock --check

docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  before_script: []
  script:
    - docker build -t cloud-atlas .
